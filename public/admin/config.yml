# Configuración del panel de administración de AlemanArt
# ─────────────────────────────────────────────────────────
# ÚNICO CAMBIO OBLIGATORIO antes de usar: en "repo", reemplaza
# TU-USUARIO por tu nombre de usuario de GitHub (y "alemanart"
# por el nombre del repositorio si usaste otro).

backend:
  name: github
  repo: TU-USUARIO/alemanart # ← CAMBIAR ESTO
  branch: main
  # Para iniciar sesión con un clic (opcional, ver GUIA-PANEL.md, Parte 4):
  # base_url: https://sveltia-cms-auth.TU-SUBDOMINIO.workers.dev

media_folder: src/assets/galeria/subidas
public_folder: /src/assets/galeria/subidas

# Cada guardado se publica directo (dispara 1 build, ~2 min en verse en línea)
locale: es

collections:
  - name: galeria
    label: Galería de fotos
    label_singular: Foto
    description: >-
      Agrega, cambia o elimina las fotos del sitio. Las más recientes aparecen
      primero automáticamente. Cada foto necesita un título corto y su categoría.
    folder: src/content/galeria
    create: true
    delete: true
    format: frontmatter
    extension: md
    slug: '{{fields.categoria}}-{{year}}{{month}}{{day}}{{hour}}{{minute}}{{second}}'
    summary: '{{titulo}} · {{categoria}}'
    sortable_fields: ['fecha', 'titulo', 'categoria']
    view_groups:
      - label: Categoría
        field: categoria
    fields:
      - label: Título
        name: titulo
        widget: string
        hint: 'Un nombre corto para identificarla, por ejemplo: Boda de María y José'
      - label: Categoría
        name: categoria
        widget: select
        options:
          - { label: 'Bodas', value: 'bodas' }
          - { label: 'Celebraciones (XV y cumpleaños)', value: 'celebraciones' }
          - { label: 'Graduaciones', value: 'graduacion' }
          - { label: 'Sesiones casuales', value: 'sesiones-casuales' }
      - label: Fotografía
        name: imagen
        widget: image
        hint: 'Sube la foto aquí. Recomendado: máximo 1800px de lado largo.'
      - label: Fecha
        name: fecha
        widget: datetime
        hint: 'Determina el orden: las más nuevas aparecen primero. Se llena sola.'
