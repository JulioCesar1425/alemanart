# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json
#
# Configuración del panel de fotos de AlemanArt
# ─────────────────────────────────────────────────────────────
# ÚNICO CAMBIO OBLIGATORIO: en "repo", reemplaza TU-USUARIO por
# tu nombre de usuario de GitHub (y "alemanart" por el nombre del
# repositorio, si usaste otro).

backend:
  name: github
  repo: TU-USUARIO/alemanart # ← CAMBIAR ESTO
  branch: main
  commit_messages:
    create: 'Nueva foto: {{slug}}'
    update: 'Foto actualizada: {{slug}}'
    delete: 'Foto eliminada: {{slug}}'
    uploadMedia: 'Imagen subida: {{path}}'
    deleteMedia: 'Imagen eliminada: {{path}}'
  # Para iniciar sesión con un clic (opcional, ver GUIA-PANEL.md, Parte 4).
  # Sin esto, se entra con un token personal de GitHub ("Sign in with Token").
  # base_url: https://sveltia-cms-auth.TU-SUBDOMINIO.workers.dev

# Todas las fotos viven en una sola carpeta. La categoría la define
# el campo "categoria" de cada ficha, no la carpeta.
media_folder: src/assets/galeria/fotos
public_folder: /src/assets/galeria/fotos

collections:
  - name: galeria
    label: Fotos del sitio
    label_singular: Foto
    icon: photo_library
    description: >-
      Agrega, cambia o elimina las fotos que se muestran en el sitio. Las más
      recientes aparecen primero de forma automática.
    folder: src/content/galeria
    create: true
    delete: true
    format: yaml-frontmatter
    extension: md
    slug: '{{fields.categoria}}-{{year}}{{month}}{{day}}-{{hour}}{{minute}}{{second}}'
    summary: '{{titulo}}'
    thumbnail: imagen
    sortable_fields:
      fields: [fecha, titulo, categoria]
      default:
        field: fecha
        direction: descending
    view_filters:
      filters:
        - { label: 'Bodas', field: categoria, pattern: 'bodas' }
        - { label: 'Celebraciones', field: categoria, pattern: 'celebraciones' }
        - { label: 'Graduaciones', field: categoria, pattern: 'graduacion' }
        - { label: 'Sesiones casuales', field: categoria, pattern: 'sesiones-casuales' }
    view_groups:
      groups:
        - { label: 'Categoría', field: categoria }
    fields:
      - label: Fotografía
        name: imagen
        widget: image
        hint: 'Arrastra la foto aquí o haz clic para elegirla. Recomendado: máximo 1800px de lado largo.'

      - label: Título
        name: titulo
        widget: string
        hint: 'Nombre corto para identificarla. Ejemplo: Boda de María y José'

      - label: Categoría
        name: categoria
        widget: select
        default: bodas
        hint: 'Determina en qué sección del sitio aparece la foto.'
        options:
          - { label: 'Bodas', value: bodas }
          - { label: 'Celebraciones (XV y cumpleaños)', value: celebraciones }
          - { label: 'Graduaciones', value: graduacion }
          - { label: 'Sesiones casuales', value: sesiones-casuales }

      - label: Fecha
        name: fecha
        widget: datetime
        default: ''
        picker_utc: false
        hint: 'Define el orden: las más nuevas aparecen primero. Se llena sola.'

      - label: Posición en el collage principal
        name: posicionCollage
        widget: select
        required: false
        hint: >-
          Opcional. El collage de la portada tiene 10 casilleros. Elige uno para
          que ESTA foto aparezca siempre ahí. Si dos fotos piden el mismo
          casillero, se muestra la más nueva. Si lo dejas en "Automática", el
          sitio elige sola entre las fotos más recientes. En celular el orden se
          reacomoda un poco para que no queden espacios en blanco.
        options:
          - { label: 'Automática (recomendado)', value: '' }
          - { label: '1 · La foto grande de arriba a la izquierda', value: '1' }
          - { label: '2 · Arriba, columna central-derecha', value: '2' }
          - { label: '3 · Arriba del todo, extremo derecho', value: '3' }
          - { label: '4 · Franja izquierda, parte media', value: '4' }
          - { label: '5 · Centro del mosaico', value: '5' }
          - { label: '6 · Centro-derecha', value: '6' }
          - { label: '7 · Derecha, parte media-baja', value: '7' }
          - { label: '8 · Izquierda, parte baja', value: '8' }
          - { label: '9 · Abajo, columna central', value: '9' }
          - { label: '10 · Abajo del todo, extremo derecho', value: '10' }
